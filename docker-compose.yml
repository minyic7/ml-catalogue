services:
  ml-catalogue:
    container_name: ml-catalogue
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  app-data:

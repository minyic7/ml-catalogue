# Build Docker image, push to GHCR, and deploy to Mac Mini via Tailscale SSH
#
# Required GitHub Secrets:
#   TS_OAUTH_CLIENT_ID — Tailscale OAuth client ID
#   TS_OAUTH_SECRET    — Tailscale OAuth secret
#   DEPLOY_SSH_KEY     — SSH private key for Mac Mini authentication
#   DEPLOY_USER        — SSH username on the Mac Mini
#   DEPLOY_HOST        — Tailscale IP of the Mac Mini (100.107.201.81)
#   DEPLOY_PATH        — Deployment directory on the Mac Mini

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"
      - ".claude/**"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/minyic7/ml-catalogue

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Mac Mini
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' \
            "Host deploy-target" \
            "  HostName ${{ secrets.DEPLOY_HOST }}" \
            "  User ${{ secrets.DEPLOY_USER }}" \
            "  IdentityFile ~/.ssh/deploy_key" \
            "  StrictHostKeyChecking no" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Copy compose files
        run: |
          scp docker-compose.yml docker-compose.prod.yml \
            deploy-target:${{ secrets.DEPLOY_PATH }}/

      - name: Deploy
        run: |
          ssh deploy-target \
            "export PATH=/usr/local/bin:\$PATH && \
             cd ${{ secrets.DEPLOY_PATH }} && \
             docker compose -f docker-compose.yml -f docker-compose.prod.yml pull && \
             docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans"

      - name: Prune old images
        run: |
          ssh deploy-target \
            "export PATH=/usr/local/bin:\$PATH && docker image prune -f"

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if ssh deploy-target \
              "curl -sf http://localhost:8000/api/health"; then
              echo ""
              echo "Health check passed on attempt $i"
              exit 0
            fi
            if [ "$i" -le 5 ]; then
              echo "Attempt $i/10 failed, waiting 2s..."
              sleep 2
            else
              echo "Attempt $i/10 failed, waiting 5s..."
              sleep 5
            fi
          done
          echo "Health check failed after 10 attempts"
          exit 1
